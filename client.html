<style>
:root{--bg:#05070A;--panel:rgba(13,18,26,.90);--tile:#101A26;--blue:#1F8CFF;--soft:#64B4FF;--cream:#F8F1E3;--muted:#A9B4C2;--green:#73D99F;--yellow:#FFD166;--red:#FF6B6B;--line:rgba(255,255,255,.14);--shadow:0 28px 80px rgba(0,0,0,.56)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% 10%,rgba(31,140,255,.32),transparent 34%),radial-gradient(circle at 88% 88%,rgba(100,180,255,.12),transparent 34%),linear-gradient(135deg,#05070A,#07101A 58%,#05070A);color:var(--cream);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.grid-bg{position:fixed;inset:0;pointer-events:none;opacity:.44;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(#000,transparent 90%)}.wrap{position:relative;max-width:1180px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.brand{display:flex;align-items:center;gap:13px}.mark{height:52px;width:52px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(145deg,var(--blue),rgba(100,180,255,.42));font-size:23px;font-weight:900;box-shadow:0 0 34px rgba(31,140,255,.36)}.eyebrow{font-size:11px;color:var(--soft);font-weight:800;letter-spacing:.18em;text-transform:uppercase}.top h1{font-size:clamp(24px,4vw,42px);letter-spacing:-.05em;line-height:1;margin:5px 0 0}.logout{border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--cream);border-radius:13px;padding:11px 14px;font-weight:700;cursor:pointer}.card{background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow)}.login{max-width:520px;margin:8vh auto;padding:30px}.login h2{font-size:clamp(30px,5vw,48px);letter-spacing:-.06em;margin:12px 0 8px}.login p,.muted{color:var(--muted);line-height:1.5}.login input{width:100%;margin:16px 0 9px;padding:15px;border:1px solid var(--line);border-radius:14px;background:rgba(5,7,10,.65);color:var(--cream);font-size:18px;outline:none}.login input:focus{border-color:var(--soft);box-shadow:0 0 0 3px rgba(31,140,255,.15)}.primary{border:1px solid rgba(100,180,255,.55);background:linear-gradient(135deg,var(--blue),#1361bf);color:white;border-radius:14px;padding:14px 17px;font-weight:800;cursor:pointer;box-shadow:0 0 28px rgba(31,140,255,.30);width:100%}.error{min-height:18px;color:var(--red);font-size:13px;font-weight:700;margin-top:10px}.hero{padding:25px;display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-bottom:16px}.hero h2{font-size:clamp(34px,5vw,58px);letter-spacing:-.065em;line-height:.92;margin:8px 0}.status{align-self:stretch;border:1px solid rgba(115,217,159,.36);border-radius:20px;padding:19px;background:linear-gradient(135deg,rgba(115,217,159,.11),rgba(255,255,255,.03))}.status.warn{border-color:rgba(255,209,102,.40);background:linear-gradient(135deg,rgba(255,209,102,.10),rgba(255,255,255,.03))}.status strong{display:block;font-size:24px;margin-top:10px}.week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:11px;margin:16px 0}.week-card{position:relative;border:1px solid var(--line);border-radius:19px;background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.018));padding:15px;text-align:left;color:var(--cream);cursor:pointer;overflow:hidden;transition:.18s ease}.week-card:hover{transform:translateY(-2px);border-color:rgba(100,180,255,.48);box-shadow:0 14px 34px rgba(31,140,255,.13)}.week-card.active{border-color:var(--blue);background:linear-gradient(145deg,rgba(31,140,255,.25),rgba(16,26,38,.92));box-shadow:0 0 28px rgba(31,140,255,.18)}.week-card:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 90% 0%,rgba(100,180,255,.2),transparent 42%);pointer-events:none}.week-card>*{position:relative;z-index:1}.week-name{font-weight:800;font-size:17px;letter-spacing:-.025em}.week-meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:12px;margin-top:7px}.focus-bar{display:flex;gap:3px;height:6px;margin-top:13px}.focus-bar i{display:block;border-radius:999px;background:var(--soft);min-width:5px}.focus-icons{margin-top:9px;color:var(--soft);font-size:11px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.overview{padding:18px;margin-bottom:16px}.overview-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.overview h3{font-size:clamp(23px,3vw,34px);letter-spacing:-.05em;margin:6px 0}.group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:9px;margin-top:14px}.group{border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.025);padding:11px}.group-top{display:flex;justify-content:space-between;gap:7px;font-size:11px;color:var(--muted);font-weight:750;text-transform:uppercase;letter-spacing:.06em}.group b{color:var(--cream)}.bar{height:6px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;margin-top:9px}.bar span{height:100%;display:block;background:linear-gradient(90deg,var(--blue),var(--soft));border-radius:999px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--muted);border-radius:999px;padding:10px 13px;font-weight:700;cursor:pointer}.tab.active{background:rgba(31,140,255,.20);border-color:rgba(100,180,255,.6);color:var(--cream);box-shadow:0 0 20px rgba(31,140,255,.20)}.workout{padding:23px}.workout-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:18px}.workout h3{font-size:clamp(27px,4vw,45px);letter-spacing:-.055em;line-height:.94;margin:7px 0}.chip{display:inline-flex;border:1px solid rgba(100,180,255,.34);background:rgba(31,140,255,.11);color:var(--soft);border-radius:999px;padding:7px 9px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}.circuits{display:grid;gap:14px;margin-top:18px}.circuit{border:1px solid var(--line);border-radius:20px;overflow:hidden;background:rgba(255,255,255,.025)}.circuit-head{padding:15px 17px;background:rgba(31,140,255,.07);display:flex;justify-content:space-between;gap:10px;align-items:center}.circuit-head b{font-size:18px}.exercise{display:grid;grid-template-columns:40px 1fr auto;gap:12px;align-items:center;padding:14px 17px;border-top:1px solid rgba(255,255,255,.08)}.num{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:rgba(31,140,255,.13);color:var(--soft);font-size:12px;font-weight:800}.exercise strong{display:block;font-size:16px;font-weight:700}.exercise small{display:block;color:var(--muted);margin-top:3px}.target{font-size:16px;font-weight:900;color:var(--cream);white-space:nowrap}.empty{padding:26px;text-align:center;color:var(--muted)}.staff-link{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);color:var(--soft);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;text-decoration:none}.staff-link:hover{color:var(--cream)}@media(max-width:760px){.wrap{padding:16px}.top{align-items:flex-start}.hero{grid-template-columns:1fr}.exercise{grid-template-columns:34px 1fr}.target{grid-column:2;text-align:left}.workout-top{flex-direction:column}.logout{padding:9px 11px}}

/* v33 mobile-first portal refinements */
@media(max-width:620px){body{padding-bottom:env(safe-area-inset-bottom)}.wrap{padding:14px 13px 28px}.top{margin-bottom:14px}.brand{gap:10px}.mark{width:44px;height:44px;border-radius:14px;font-size:19px}.top h1{font-size:25px}.logout{padding:9px 10px;font-size:12px}.login{margin:5vh auto;padding:22px 18px}.login h2{font-size:35px;line-height:.98}.login input{font-size:16px;padding:14px}.hero{padding:18px;border-radius:21px;gap:12px}.hero h2{font-size:38px}.status{padding:14px;border-radius:16px}.week-grid{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:10px;padding:2px 1px 8px;margin:13px 0}.week-card{min-width:242px;scroll-snap-align:start}.overview{padding:16px;border-radius:21px}.overview h3{font-size:27px}.group-grid{grid-template-columns:1fr 1fr;gap:8px}.group{padding:10px}.tabs{position:sticky;top:0;z-index:5;flex-wrap:nowrap;overflow-x:auto;padding:9px 0 11px;margin:12px 0;background:linear-gradient(180deg,#07101A 70%,transparent)}.tab{white-space:nowrap;padding:10px 12px;font-size:13px}.workout{padding:16px;border-radius:21px}.workout h3{font-size:33px}.circuit{border-radius:16px}.circuit-head{padding:13px}.circuit-head b{font-size:16px}.exercise{grid-template-columns:31px minmax(0,1fr);gap:10px;padding:13px}.exercise strong{font-size:15px}.exercise small{font-size:12px;line-height:1.35}.target{grid-column:2;font-size:17px;color:var(--soft);padding-top:1px}.staff-link{font-size:10px}.focus-icons{font-size:10px}}



/* v39 Axon Performance client portal polish */
:root{--bg:#02060b;--panel:rgba(8,14,22,.86);--tile:#0e1722;--blue:#63D3FD;--blue2:#8DE4FF;--cream:#F7F3EA;--muted:#AEB9C8;--line:rgba(141,228,255,.20);--green:#73D99F;--yellow:#FFD166;--red:#FF6B6B;--radius:28px;}
html,body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
body{background:radial-gradient(circle at 14% 8%,rgba(99,211,253,.22),transparent 32%),radial-gradient(circle at 86% 10%,rgba(111,124,255,.12),transparent 26%),linear-gradient(135deg,#02060b,#07111c 58%,#02060b)!important;}
body:before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:linear-gradient(rgba(141,228,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(141,228,255,.04) 1px,transparent 1px);background-size:58px 58px;animation:axonClientGrid 26s linear infinite;mask-image:linear-gradient(to bottom,rgba(0,0,0,.78),transparent 90%)}
@keyframes axonClientGrid{to{background-position:58px 58px,58px 58px}}
.card,.top,.workout,.login{background:linear-gradient(180deg,rgba(12,19,29,.88),rgba(5,10,16,.76))!important;border-color:rgba(141,228,255,.20)!important;box-shadow:0 24px 74px rgba(0,0,0,.46),0 0 30px rgba(99,211,253,.08)!important;backdrop-filter:blur(18px)}
.mark{border-radius:22px!important;border:1px solid rgba(141,228,255,.58)!important;background:linear-gradient(145deg,rgba(99,211,253,.96),rgba(18,73,118,.94) 58%,rgba(8,16,26,.96))!important;color:#fff!important;box-shadow:0 0 34px rgba(99,211,253,.35),inset 0 1px 0 rgba(255,255,255,.26)!important;letter-spacing:-.045em!important;}
.eyebrow{color:var(--blue2)!important;letter-spacing:.18em!important;}
.primary,.tab.active,.week-card.active{background:linear-gradient(135deg,#63D3FD,#2E84FF)!important;border-color:rgba(141,228,255,.70)!important;color:#fff!important;box-shadow:0 14px 36px rgba(46,132,255,.22),0 0 24px rgba(99,211,253,.14)!important;}
input{background:rgba(3,8,13,.76)!important;border-color:rgba(141,228,255,.18)!important;color:var(--cream)!important;}
input:focus{border-color:var(--blue)!important;box-shadow:0 0 0 3px rgba(99,211,253,.15)!important;outline:none!important;}
.exercise-card,.week-card,.group,.status{background:linear-gradient(160deg,rgba(13,27,41,.96),rgba(5,12,20,.94))!important;border-color:rgba(141,228,255,.16)!important;}
.reps,.badge,.chip{color:var(--blue2)!important;border-color:rgba(141,228,255,.24)!important;background:rgba(99,211,253,.10)!important;}
@media(max-width:640px){.top{position:sticky;top:0;z-index:20;border-radius:0 0 24px 24px}.brand{gap:12px}.mark{width:54px!important;height:54px!important}.week-grid{display:flex!important;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:6px}.week-card{min-width:78vw;scroll-snap-align:start}.tabs{position:sticky;top:86px;z-index:18;background:rgba(2,6,11,.86);backdrop-filter:blur(14px);padding:8px;border-radius:18px;overflow-x:auto}.tab{white-space:nowrap}.workout h2{font-size:clamp(32px,12vw,58px)!important}.exercise-card{padding:14px!important}}

</style>
</head>
<body><div class="grid-bg"></div><main class="wrap" id="app"></main>
<script>
const PORTAL_ENDPOINT='/.netlify/functions/workout-portal';
const SESSION_KEY='axonClientPortalSessionV37';
let state={board:null,week:0,selected:0,poll:null,client:null,token:'',publishedAt:''};
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));}
function words(){return{Lower:['squat','deadlift','rdl','lunge','leg','calf','hip','glute','step up','sled'],Upper:['press','bench','row','pull','curl','raise','lat','shoulder','push up','pushup','tricep','bicep'],Core:['plank','crunch','pallof','dead bug','carry','core'],Conditioning:['bike','row erg','rower','ski','rope','burpee','run','shuttle','climber']}}
function groups(w){const all=words(),map=Object.fromEntries(Object.keys(all).map(k=>[k,0]));let total=0;(w.programs||[]).forEach(p=>(p.circuits||[]).forEach(c=>(c.stations||[]).forEach(s=>{total++;const n=(s.exercise||'').toLowerCase();Object.keys(all).forEach(k=>{if(all[k].some(term=>n.includes(term)))map[k]++})})));return Object.entries(map).map(([name,count])=>({name,count,pct:total?Math.round(count/total*100):0})).filter(x=>x.count).sort((a,b)=>b.pct-a.pct)}
async function api(body){
  let response;
  try{response=await fetch(PORTAL_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}catch(error){throw new Error('Could not reach the client portal service. Check the Netlify deployment and try again.');}
  let payload={};try{payload=await response.json();}catch(ignore){}
  if(!response.ok||!payload.ok){const error=new Error(payload.error||'The client portal could not complete that request.');error.status=response.status;throw error;}
  return payload;
}
function saveSession(){try{sessionStorage.setItem(SESSION_KEY,JSON.stringify({token:state.token,client:state.client}));}catch{}}
function clearSession(){try{sessionStorage.removeItem(SESSION_KEY);}catch{}}
function stopPolling(){if(state.poll){clearInterval(state.poll);state.poll=null}}
function clientLogout(){stopPolling();clearSession();state={board:null,week:0,selected:0,poll:null,client:null,token:'',publishedAt:''};renderLogin();}
async function readLive(){return api({action:'read',session:state.token});}
function startPolling(){stopPolling();state.poll=setInterval(async()=>{try{const live=await readLive();const stamp=live.publishedAt||'';if(stamp!==state.publishedAt){state.board=live.board||{weeks:[]};state.publishedAt=stamp;state.week=Math.min(state.week,Math.max(0,(state.board.weeks||[]).length-1));state.selected=0;renderPortal('Your training board just updated.');}}catch(error){/* Do not interrupt an active workout if a later refresh is unavailable. */}},30000)}
function renderLogin(message=''){stopPolling();$('app').innerHTML=`<section class="card login"><div class="mark">AP</div><div class="eyebrow" style="margin-top:18px">AXON PERFORMANCE • CLIENT WORKOUT PORTAL</div><h2>Your training,<br>ready when you are.</h2><p>This portal is view-only. Enter the private PIN provided by your coach to open your workouts.</p><form id="clientLogin"><input id="clientPin" autocomplete="one-time-code" inputmode="text" placeholder="Client access PIN" autofocus><button class="primary">Open Workouts</button><div class="error">${esc(message)}</div></form><a class="staff-link" href="/">Staff member? Return to the workout dashboard <span>→</span></a></section>`;$('clientLogin').onsubmit=async e=>{e.preventDefault();const pin=$('clientPin').value.trim();if(!pin){renderLogin('Enter your client PIN to continue.');return;}$('clientLogin').querySelector('button').disabled=true;try{const payload=await api({action:'login',pin});state.client=payload.client||{name:'Client'};state.token=payload.session||'';state.board=payload.board||{weeks:[]};state.publishedAt=payload.publishedAt||'';state.week=0;state.selected=0;saveSession();renderPortal();startPolling();}catch(error){renderLogin(error.status===401?'That client PIN is not recognized.':'Could not open the workout portal. '+(error.message||''));}}}
function weekCard(w,i){const g=groups(w).slice(0,3),count=(w.programs||[]).length;return `<button class="week-card ${state.week===i?'active':''}" onclick="state.week=${i};state.selected=0;renderPortal()"><div class="week-name">${esc(w.week||'Week '+(i+1))}</div><div class="week-meta"><span>${count} workout${count===1?'':'s'}</span><span>${g[0]?g[0].name:'Unassigned'}</span></div><div class="focus-bar">${g.map(x=>`<i style="flex:${Math.max(1,x.pct)}"></i>`).join('')}</div><div class="focus-icons">${g.map(x=>`${x.name} ${x.pct}%`).join(' · ')||'No movements yet'}</div></button>`}
function renderPortal(notice=''){const weeks=state.board?.weeks||[];if(!weeks.length){$('app').innerHTML=`<header class="top"><div class="brand"><div class="mark">AP</div><div><div class="eyebrow">Client Workout Portal</div><h1>Training Portal</h1></div></div><button class="logout" onclick="clientLogout()">Log out</button></header><section class="card empty"><div class="eyebrow">Access confirmed</div><h2 style="margin:10px 0;font-size:34px;letter-spacing:-.05em">Your workouts are not published yet.</h2><p>Ask your coach to save the Local Board, choose <b>Set Publish Key</b>, then use <b>Sync Client Portal</b>. Your private PIN is active.</p></section>`;return}const week=weeks[state.week]||weeks[0],programs=week.programs||[];if(state.selected>=programs.length)state.selected=0;const p=programs[state.selected];const focus=groups(week);$('app').innerHTML=`<header class="top"><div class="brand"><div class="mark">AP</div><div><div class="eyebrow">AXON PERFORMANCE CLIENT PORTAL</div><h1>${esc(state.client&&state.client.name||'Current Training')}</h1></div></div><button class="logout" onclick="clientLogout()">Log out</button></header>${notice?`<div class="notice">${esc(notice)}</div>`:''}<section class="card hero"><div><div class="eyebrow">Shared workout board</div><h2>${esc(week.week||'Current Week')}</h2><p class="muted">${esc(week.summary||'Your current training plan is ready below.')}</p></div><div class="status"><div class="eyebrow">Board status</div><strong>✓ Training Ready</strong><p class="muted">${state.publishedAt?`Updated ${new Date(state.publishedAt).toLocaleString()}`:'Live access confirmed'}</p></div></section><section class="week-grid">${weeks.map(weekCard).join('')}</section><section class="card overview"><div class="overview-head"><div><div class="eyebrow">Weekly Training Outline</div><h3>Muscle Grouping & Focus</h3><p class="muted">Calculated from the exercises programmed into this training week.</p></div><span class="chip">${programs.length} workouts</span></div><div class="group-grid">${focus.length?focus.map(x=>`<div class="group"><div class="group-top"><span>${x.name}</span><b>${x.pct}%</b></div><div class="bar"><span style="width:${x.pct}%"></span></div></div>`).join(''):'<div class="muted">Add movements in the Workout Builder to build the training outline.</div>'}</div></section><nav class="tabs">${programs.map((x,i)=>`<button class="tab ${i===state.selected?'active':''}" onclick="state.selected=${i};renderPortal()">${esc(x.name||'Workout '+(i+1))}</button>`).join('')}</nav>${p?workoutMarkup(p):'<section class="card empty">No workouts are programmed for this week.</section>'}`}
function workoutMarkup(p){return `<section class="card workout"><div class="workout-top"><div><div class="chip">${esc((p.mode||'strength').toUpperCase())}${p.mode==='timed'?` • ${esc(p.work||0)}s / ${esc(p.rest||0)}s`:''}</div><h3>${esc(p.name||'Workout')}</h3><p class="muted">${esc(p.desc||'Complete each circuit with controlled execution and coach notes in mind.')}</p></div><div class="chip">${esc(p.rounds||3)} rounds</div></div><div class="circuits">${(p.circuits||[]).map((c,ci)=>`<article class="circuit"><div class="circuit-head"><b>${esc(c.name||'Circuit '+(ci+1))}</b><span class="chip">${(c.stations||[]).length} exercises</span></div>${(c.stations||[]).map((s,i)=>`<div class="exercise"><div class="num">${i+1}</div><div><strong>${esc(s.exercise||'Exercise')}</strong><small>${esc(s.note||'Use controlled form and follow your coach’s instructions.')}</small></div><div class="target">${esc(s.prescription||'—')}</div></div>`).join('')}</article>`).join('')}</div></section>`}
async function restoreSession(){let stored=null;try{stored=JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null')}catch{}if(!stored||!stored.token){renderLogin();return}state.token=stored.token;state.client=stored.client||{name:'Client'};renderLogin('Restoring your training…');try{const payload=await readLive();state.board=payload.board||{weeks:[]};state.publishedAt=payload.publishedAt||'';renderPortal();startPolling();}catch(error){clearSession();renderLogin('Your session expired. Enter your client PIN again.');}}
restoreSession();
</script></body></html>
